name: Daily DB Backup

on:
  schedule:
    - cron: '0 1 * * *'   # 04:00 EAT (01:00 UTC)
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Install postgresql-client-17
        run: |
          sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/postgresql.gpg
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17
          pg_dump --version

      - name: Run pg_dump
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_BACKUP }}
        run: |
          STAMP=$(date -u +%Y%m%d-%H%M%S)
          pg_dump "$DATABASE_URL" --no-owner --no-acl > rada-backup-$STAMP.sql
          gzip rada-backup-$STAMP.sql
          ls -lh rada-backup-*

      - name: Upload as artifact (7-day retention)
        uses: actions/upload-artifact@v4
        with:
          name: rada-db-backup-${{ github.run_id }}
          path: rada-backup-*.sql.gz
          retention-days: 7
