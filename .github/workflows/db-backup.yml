name: Daily DB Backup

on:
  schedule:
    - cron: '0 1 * * *'   # 04:00 EAT (01:00 UTC) — before notifications cron at 04:00 UTC
  workflow_dispatch:       # allow manual trigger from Actions tab

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Install postgresql-client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Run pg_dump
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_BACKUP }}
        run: |
          STAMP=$(date -u +%Y%m%d-%H%M%S)
          pg_dump "$DATABASE_URL" --no-owner --no-acl > rada-backup-$STAMP.sql
          gzip rada-backup-$STAMP.sql
          ls -lh rada-backup-*

      - name: Upload as artifact (7-day retention)
        uses: actions/upload-artifact@v4
        with:
          name: rada-db-backup-${{ github.run_id }}
          path: rada-backup-*.sql.gz
          retention-days: 7
