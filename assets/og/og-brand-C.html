<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Archivo:wght@700;900&display=swap');

  body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    font-family: 'Outfit', sans-serif;
    background: rgba(255,255,255,0.2);
  }

  .canvas {
    width: 1200px;
    height: 630px;
    position: relative;
    background: linear-gradient(135deg, #1e1b4b 0%, #312e81 40%, #3730a3 70%, #312e81 100%);
    overflow: hidden;
  }

  /* Geometric background elements */
  .geo-circle-1 {
    position: absolute;
    width: 600px; height: 600px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.12);
    top: -150px; right: -100px;
  }
  .geo-circle-2 {
    position: absolute;
    width: 400px; height: 400px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.08);
    top: -50px; right: 50px;
  }
  .geo-circle-3 {
    position: absolute;
    width: 300px; height: 300px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,255,255,0.08) 0%, transparent 70%);
    bottom: -80px; left: -80px;
  }

  /* Grid dots */
  .grid {
    position: absolute;
    inset: 0;
    background-image: radial-gradient(rgba(255,255,255,0.12) 1px, transparent 1px);
    background-size: 40px 40px;
  }

  /* Glow */
  .glow {
    position: absolute;
    width: 500px; height: 300px;
    background: radial-gradient(ellipse, rgba(255,255,255,0.15) 0%, transparent 70%);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
  }

  /* Content */
  .content {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
    padding: 60px;
  }

  /* RADA badge */
  .badge {
    background: rgba(255,255,255,0.2);
    color: #fff;
    font-family: 'Archivo', sans-serif;
    font-size: 13px;
    font-weight: 900;
    letter-spacing: 0.15em;
    padding: 6px 16px;
    border-radius: 6px;
    margin-bottom: 24px;
    text-transform: uppercase;
  }

  /* Logo */
  .logo {
    font-family: 'Outfit', sans-serif;
    font-size: 86px;
    font-weight: 900;
    color: #fff;
    letter-spacing: -0.04em;
    line-height: 1;
    margin-bottom: 8px;
  }
  .logo span {
    color: #a78bfa;
  }

  /* Divider */
  .divider {
    width: 80px;
    height: 3px;
    background: linear-gradient(90deg, transparent, #6d28d9, transparent);
    margin: 20px 0;
    border-radius: 2px;
  }

  /* Tagline */
  .tagline {
    font-size: 22px;
    font-weight: 700;
    color: rgba(255,255,255,0.85);
    letter-spacing: 0.02em;
    text-align: center;
    margin-bottom: 12px;
  }
  .tagline strong {
    color: #e9d5ff;
  }

  /* Sub tagline */
  .sub {
    font-size: 16px;
    font-weight: 400;
    color: rgba(255,255,255,0.45);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    text-align: center;
  }

  /* Pills row */
  .pills {
    display: flex;
    gap: 10px;
    margin-top: 28px;
  }
  .pill {
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.3);
    color: rgba(255,255,255,0.9);
    font-size: 13px;
    font-weight: 600;
    padding: 6px 14px;
    border-radius: 20px;
    letter-spacing: 0.03em;
  }

  /* Bottom bar */
  .bottom-bar {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, rgba(255,255,255,0.3), rgba(255,255,255,0.7), rgba(255,255,255,0.3));
  }

  /* Corner flag */
  .corner-flag {
    position: absolute;
    top: 36px; right: 40px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    font-weight: 700;
    color: rgba(255,255,255,0.4);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .flag-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #22c55e;
  }
</style>
</head>
<body>
<div class="canvas">
  <div class="grid"></div>
  <div class="geo-circle-1"></div>
  <div class="geo-circle-2"></div>
  <div class="geo-circle-3"></div>
  <div class="glow"></div>

  <div class="corner-flag">
    <div class="flag-dot"></div>
    checkrada.co.ke
  </div>

  <div class="content">
    <div class="badge">CHECKRADA</div>
    <div class="logo">Check<span>Rada</span></div>
    <div class="divider"></div>
    <div class="tagline"><strong>Africa's 1st</strong> Prediction Market Platform</div>
    <div class="sub">Kenya's Crowd Intelligence Engine</div>
    <div class="pills">
      <div class="pill">🇰🇪 M-Pesa Native</div>
      <div class="pill">📊 Real Stakes</div>
      <div class="pill">💡 Crowd Intelligence</div>
    </div>
  </div>

  <div class="bottom-bar"></div>
</div>
</body>
</html>
